# R7 §2 — MSRV = 1.85 (clap·ring·rustls·config·rand의 공통 floor).
# 본 pin이 toolchain 강제 메커니즘 (cargo는 rust-version을 경고로만 처리).
[toolchain]
channel = "1.85"
components = ["rustfmt", "clippy"]
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
]
profile = "minimal"
