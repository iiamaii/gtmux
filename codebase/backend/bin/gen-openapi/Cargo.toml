# gen-openapi: OpenAPI 3.1 generator for the gtmux API.
#
# Emits the Canvas Layout schema (ADR-0018) on stdout, sourced directly from
# the `gtmux-http-api` crate's utoipa `ToSchema` derives (ADR-0042 /
# plan-0017 Phase 1). Replaces the earlier Group/Panel id-only bootstrap stub.

[package]
name        = "gen-openapi"
version     = "0.0.0"
edition.workspace     = true
rust-version.workspace = true
license.workspace     = true
publish     = false

[[bin]]
name = "gen-openapi"
path = "src/main.rs"

[dependencies]
gtmux-http-api = { path = "../../crates/http-api" }
utoipa  = { workspace = true }
anyhow  = { workspace = true }
serde_yaml = "0.9"
