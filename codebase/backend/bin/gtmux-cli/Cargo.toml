[package]
name = "gtmux-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "gtmux"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
gtmux-pty-backend = { path = "../../crates/pty-backend" }
gtmux-ws-server = { path = "../../crates/ws-server" }
gtmux-http-api = { path = "../../crates/http-api" }
gtmux-config = { path = "../../crates/config" }
gtmux-auth = { path = "../../crates/auth" }
thiserror = { workspace = true }
# CIDR matching for the trusted-proxy X-Forwarded-For allowlist (ADR-0003 D12).
# The parsed `Vec<IpNet>` is threaded from boot into the http-api AppState.
ipnet = { workspace = true }
# Offline `gtmux session ls|export|import` (ADR-0044 D-C2) reads/wraps/validates
# session layout + export-envelope JSON directly against the workspace dir.
serde_json = { workspace = true }
# libc surfaces `pid_t` + `kill(2)` for the pidfile + SIGTERM teardown
# logic in `state_files.rs` (inlined from the pre-Stage-B lifecycle crate
# after ADR-0013 made the tmux-specific parts of that crate obsolete).
libc = "0.2"
# sysinfo — Boot-time orphan scanner (ADR-0014 D11). Process iteration +
# environ() inspection for child shells that survived a crashed prior
# Server instance.
sysinfo = { workspace = true }
# Read a password from the TTY without echoing it.
rpassword = { workspace = true }

[dev-dependencies]
tempfile = "3"
