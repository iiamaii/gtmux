# gtmux Sample Config — single-user · 외부 접속 (`bind = 0.0.0.0`)
#
# 사용법:
#   1) 본 파일을 `~/.config/gtmux/<session>.config.toml` 로 복사
#   2) `PUBLIC_IP` 와 `9001` 을 본인 환경에 맞게 교체
#   3) `gtmux start --session <session> --config ~/.config/gtmux/<session>.config.toml`
#
# 상세: codebase/QUICKSTART.ko.md, docs/deploy.md

schema_version = 1

[server]
# 1:1:1 식별자. 부팅 immutable. `--session <name>` 과 일치해야 함.
session = "prod"
# 외부 노출 port. 1024 미만은 privileged 라 거부됨.
port    = 9001
# 0.0.0.0 = 모든 인터페이스 listen. cloud mode 자동 발동 (rate limit / HSTS / strict origin).
# loopback 으로 두려면 "127.0.0.1" — 그땐 [cloud] 섹션은 통째로 삭제.
bind    = "0.0.0.0"

[runtime]
# tracing 레벨: trace | debug | info | warn | error | off
log_level  = "info"
# auto (tty=text / pipe=json) | text | json. systemd journal 이면 "json".
log_format = "auto"

[security]
# 클라이언트 브라우저가 보내올 Origin 을 정확 일치 화이트리스트로 명시.
# wildcard 금지. scheme + host + port 형식.
# 여러 host (IP + domain) 동시 허용하려면 리스트에 모두 나열.
cors_origins   = ["http://PUBLIC_IP:9001"]

# Host 헤더 화이트리스트 — DNS rebinding 방어. cors_origins 와 host 부분 일치.
host_allowlist = ["PUBLIC_IP:9001"]

[auth]
# "token" | "password"
#   token   — `gtmux start` 가 매번 새 URL 발행. CLI 자동화 친화.
#   password — Argon2id hash 1회 설정. 사람이 직접 로그인 친화.
# 현재 Quickstart 는 token mode 를 기준으로 검증한다. password mode 는
# boot/login 경로 정리 후 별도 운영 경로로 승격한다.
mode                = "token"

# Cookie max-age (일 단위, 1–30). Rolling renewal — 사용 중이면 자동 연장.
cookie_max_age_days = 7

# Password mode 의 brute-force 방어. 5 시도 / 5분 / IP 초과 시 429 + lockout.
rate_limit_per_5min = 5

[assets]
# Asset 1개당 최대 저장 크기. 기본값은 50 MiB.
# 본 sample 은 운영 여유를 위해 100 MiB 로 설정한다.
max_size_bytes = 104857600

# [cloud] 섹션 — bind 가 loopback 밖이면 *config validate 통과를 위해 필수*.
# 기본값은 tls_required=true 이며 Secure cookie + HSTS 를 전제로 한다.
# Quickstart 는 신뢰된 네트워크의 평문 HTTP 검증 경로이므로 명시적으로 false.
# Production: reverse proxy + HTTPS origin 으로 운영하고 tls_required=true 유지.
[cloud]
tls_required                        = false
rate_limit_auth_failures_per_minute = 10
# 신뢰 프록시 IP allowlist (CIDR) — reverse proxy 뒤에서 X-Forwarded-For 의
# 클라이언트 IP 를 *이 IP 에서 온 요청에 한해* rate-limit key 로 신뢰한다
# (ADR-0003 D12). 미설정/빈 목록이면 XFF 무시 → 프록시 socket IP 단일 버킷
# (모든 클라이언트가 한 버킷 공유) + boot 경고. 프록시 IP 를 넣어야 per-client 동작.
# trusted_proxy_ips          = ["127.0.0.1/32"]
# trusted_proxy_ips_required = true   # false 로 두면 빈 목록 경고를 끈다
