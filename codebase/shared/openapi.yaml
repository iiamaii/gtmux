openapi: 3.1.0
info:
  title: gtmux API
  description: gtmux Canvas Layout schema (ADR-0018). Generated from gtmux-http-api schema.rs via utoipa (ADR-0042).
  license:
    name: MIT OR Apache-2.0
    identifier: MIT OR Apache-2.0
  version: 0.0.0
paths: {}
components:
  schemas:
    Anchor:
      type: string
      description: |-
        9-point connector anchor — 8 cardinal/diagonal edges + center (ADR-0036 D2).
        Wire form uses the uppercase keyword for the 8 edges and lowercase
        `"center"` for the middle. The `"auto"` mode is P1+.
      enum:
      - N
      - NE
      - E
      - SE
      - S
      - SW
      - W
      - NW
      - center
    Direction:
      type: string
      description: |-
        Connector arrowhead direction mode (ADR-0036 D4). `head_from` / `head_to`
        may still override the default mapping per-end.
      enum:
      - uni
      - bi
      - none
    FigureStrokeDash:
      type: string
      description: |-
        Figure stroke dash pattern (ADR-0018 D4 amend ① — 2026-05-20 batch 5,
        rect / ellipse / line). Kept distinct from connector's [`StrokeDash`]
        because the figure form is a 4-variant enum with an explicit `Solid`
        default, while connector's wire uses `null` for solid (round-trip
        compatibility would break if the two were unified).

        Wire form is `snake_case`: `"solid" | "dash" | "dot" | "dash_dot"`.
      enum:
      - solid
      - dash
      - dot
      - dash_dot
    FontFamily:
      type: string
      description: |-
        Font family bucket for text-bearing items (ADR-0041 D1). Three named
        stacks resolved to concrete `font-family` declarations FE-side; the BE
        only persists the keyword. Applies to `text` / `rect` / `ellipse`
        (ADR-0041 D3 — `note` / `document` keep their own typography).

        Wire form is `lowercase`: `"sans" | "serif" | "mono"`. Default = `Sans`.
        An unknown variant is a serde deserialize error (strict) — the enum is
        FE-controlled so `#[serde(other)]` fallback is intentionally not added
        (an unrecognised value is safer rejected than silently coerced). The
        per-field `#[serde(default)]` keeps a *missing* field from rejecting the
        whole layout.
      enum:
      - sans
      - serif
      - mono
    FontWeight:
      type: string
      description: |-
        Text font weight (ADR-0018 D4 amend ② — 2026-05-20 batch 5). MVP carries
        three named buckets; numeric weights (100…900) are P1.
      enum:
      - light
      - normal
      - bold
    Group:
      type: object
      description: |-
        Group node — shape locked by ADR-0010, kept identical across the v1→v2
        cutover so `boot_migration_v1_to_v2` can preserve `groups[]` verbatim.
      required:
      - id
      - label
      - visibility
      - locked
      - order
      properties:
        color:
          type:
          - string
          - 'null'
        id:
          type: string
        label:
          type: string
        locked:
          type: boolean
        order:
          type: integer
          format: int32
        parent_id:
          type:
          - string
          - 'null'
        visibility:
          $ref: '#/components/schemas/Visibility'
      additionalProperties: false
    Head:
      type: string
      description: Per-end connector head marker (ADR-0036 D4).
      enum:
      - arrow
      - circle
      - diamond
      - none
    Item:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - terminal
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - text
          - font_size
          - color
          properties:
            color:
              type: string
            corner_rounded:
              type: boolean
              description: Rounded-corner toggle for the text box (radius computed FE-side).
            fill:
              type: string
              description: Box fill color. Empty string = FE token default.
            fill_enabled:
              type: boolean
              description: |-
                Box fill on/off. ADR-0040 D2: **default `false`** (opposite of
                Rect/Ellipse) so legacy text records render box-less.
            font_family:
              $ref: '#/components/schemas/FontFamily'
              description: ADR-0041 D3 — font family bucket. Defaults to `Sans`.
            font_size:
              type: integer
              format: int32
              minimum: 0
            font_weight:
              $ref: '#/components/schemas/FontWeight'
              description: |-
                ADR-0018 D4 amend ② (2026-05-20 batch 5) — text font weight.
                Defaults to `Normal` when absent so legacy records round-trip.
            italic:
              type: boolean
              description: 'ADR-0018 D4 amend ② — italic toggle. CSS `font-style: italic`.'
            label_auto:
              type:
              - boolean
              - 'null'
              description: |-
                ADR-0040 D9 — label auto-derive hint. `None` = unset (no strict
                invariant); `Some(true)` = label tracks `text`, `Some(false)` =
                user pinned a custom label.
            strikethrough:
              type: boolean
              description: ADR-0018 D4 amend ② — strikethrough toggle.
            stroke:
              type: string
              description: Box stroke color. Empty string = FE token default.
            stroke_dash:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/FigureStrokeDash'
                description: Box stroke dash pattern. `None` = solid.
            stroke_enabled:
              type: boolean
              description: |-
                Box stroke on/off. ADR-0040 D2: **default `false`** (opposite of
                Rect/Ellipse).
            stroke_width:
              type: integer
              format: int32
              description: Box stroke width. Shared figure range 1..=32; default 2.
              minimum: 0
            text:
              type: string
            text_align:
              $ref: '#/components/schemas/TextAlign'
            text_vertical_align:
              $ref: '#/components/schemas/TextVerticalAlign'
            underline:
              type: boolean
              description: |-
                ADR-0018 D4 amend ② — underline toggle. Composes with
                `strikethrough` via CSS `text-decoration: underline line-through`.
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - text
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - title
          - body
          - color
          properties:
            body:
              type: string
            color:
              type: string
            title:
              type: string
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - note
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - stroke
          - fill
          - stroke_width
          properties:
            color:
              type: string
              description: Embedded text color. Empty string = FE token foreground.
            corner_rounded:
              type: boolean
              description: |-
                ADR-0018 D4 amend ① — rounded-corner toggle (rect only). The
                actual radius is computed FE-side as `clamp(min(w,h)*0.15, 4, 16)`;
                the BE only persists the boolean.
            fill:
              type: string
            fill_enabled:
              type: boolean
              description: |-
                ADR-0018 D4 amend ① (2026-05-20 batch 5) — fill on/off.
                `false` is *not* alpha=0: hit-testing is also disabled by the FE
                (the painted area no longer captures pointer events). Legacy
                records default to `true`.
            font_family:
              $ref: '#/components/schemas/FontFamily'
              description: ADR-0041 D3 — font family bucket. Defaults to `Sans`.
            font_size:
              type: integer
              format: int32
              description: Embedded text size. 8..=96; default 14.
              minimum: 0
            font_weight:
              $ref: '#/components/schemas/FontWeight'
            italic:
              type: boolean
            label_auto:
              type:
              - boolean
              - 'null'
              description: ADR-0040 D9 — label auto-derive hint. See `Item::Text::label_auto`.
            strikethrough:
              type: boolean
            stroke:
              type: string
            stroke_dash:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/FigureStrokeDash'
                description: |-
                  ADR-0018 D4 amend ① — stroke dash pattern. `None` means solid;
                  `Some(Solid)` round-trips identically.
            stroke_enabled:
              type: boolean
              description: |-
                ADR-0018 D4 amend ① — stroke on/off. `false` removes both the
                rendered border and its hit-target band.
            stroke_width:
              type: integer
              format: int32
              minimum: 0
            text:
              type: string
              description: Embedded text body. Default `""` (legacy rects render no text).
            text_align:
              $ref: '#/components/schemas/TextAlign'
            text_vertical_align:
              $ref: '#/components/schemas/TextVerticalAlign'
            underline:
              type: boolean
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - rect
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - stroke
          - fill
          - stroke_width
          properties:
            color:
              type: string
              description: Embedded text color. Empty string = FE token foreground.
            fill:
              type: string
            fill_enabled:
              type: boolean
              description: ADR-0018 D4 amend ① — see `Rect::fill_enabled`.
            font_family:
              $ref: '#/components/schemas/FontFamily'
              description: ADR-0041 D3 — font family bucket. Defaults to `Sans`.
            font_size:
              type: integer
              format: int32
              description: Embedded text size. 8..=96; default 14.
              minimum: 0
            font_weight:
              $ref: '#/components/schemas/FontWeight'
            italic:
              type: boolean
            label_auto:
              type:
              - boolean
              - 'null'
              description: ADR-0040 D9 — label auto-derive hint. See `Item::Text::label_auto`.
            strikethrough:
              type: boolean
            stroke:
              type: string
            stroke_dash:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/FigureStrokeDash'
                description: ADR-0018 D4 amend ① — stroke dash pattern. `None` = solid.
            stroke_enabled:
              type: boolean
              description: ADR-0018 D4 amend ① — see `Rect::stroke_enabled`.
            stroke_width:
              type: integer
              format: int32
              minimum: 0
            text:
              type: string
              description: Embedded text body. Default `""`.
            text_align:
              $ref: '#/components/schemas/TextAlign'
            text_vertical_align:
              $ref: '#/components/schemas/TextVerticalAlign'
            underline:
              type: boolean
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - ellipse
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - stroke
          - stroke_width
          - x2
          - y2
          properties:
            stroke:
              type: string
            stroke_dash:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/FigureStrokeDash'
                description: ADR-0018 D4 amend ① — stroke dash pattern. `None` = solid.
            stroke_width:
              type: integer
              format: int32
              minimum: 0
            x2:
              type: number
              format: double
            y2:
              type: number
              format: double
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - line
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - stroke
          - stroke_width
          - points
          properties:
            points:
              type: array
              items:
                $ref: '#/components/schemas/Point'
            stroke:
              type: string
            stroke_width:
              type: integer
              format: int32
              minimum: 0
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - free_draw
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - asset_id
          - mime
          properties:
            asset_id:
              type: string
            mime:
              type: string
            original_h:
              type:
              - integer
              - 'null'
              format: int32
              minimum: 0
            original_w:
              type:
              - integer
              - 'null'
              format: int32
              minimum: 0
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - image
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - mime
          - file_name
          - size_bytes
          properties:
            asset_id:
              type:
              - string
              - 'null'
              description: |-
                (a) asset-based mode: sha256 → `/api/assets/<asset_id>`.
                (b) inline-stored mode: `None`.
            content:
              type:
              - string
              - 'null'
              description: |-
                (b) inline-stored UTF-8 markdown, capped at
                [`DOCUMENT_INLINE_MAX_BYTES`]. (a) is `None`.
            file_name:
              type: string
            mime:
              type: string
            size_bytes:
              type: integer
              format: int64
              description: |-
                (a) asset-based: real binary size.
                (b) inline-stored: `content.len()` bytes.
              minimum: 0
        - type: object
          description: |-
            ADR-0018 D10 amend ① — two-mode document item:
              * (a) asset-based — `asset_id` is `Some(sha256)`, `content` is
                `None`. The actual bytes live behind `/api/assets/<asset_id>`
                (Stage 2, ADR-0030 to-be).
              * (b) inline-stored — `asset_id` is `None`, `content` is
                `Some(<utf-8 markdown>)` capped at [`DOCUMENT_INLINE_MAX_BYTES`].
            The two modes are *mutually exclusive*; `validate()` enforces this
            (`DocumentMissingSource` / `DocumentBothSources`).
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - document
        description: |-
          ADR-0018 D10 amend ① — two-mode document item:
            * (a) asset-based — `asset_id` is `Some(sha256)`, `content` is
              `None`. The actual bytes live behind `/api/assets/<asset_id>`
              (Stage 2, ADR-0030 to-be).
            * (b) inline-stored — `asset_id` is `None`, `content` is
              `Some(<utf-8 markdown>)` capped at [`DOCUMENT_INLINE_MAX_BYTES`].
          The two modes are *mutually exclusive*; `validate()` enforces this
          (`DocumentMissingSource` / `DocumentBothSources`).
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - path
          properties:
            kind:
              type:
              - string
              - 'null'
            path:
              type: string
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - file_path
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          required:
          - from_id
          - to_id
          - from_anchor
          - to_anchor
          - direction
          - stroke
          - stroke_width
          - head_from
          - head_to
          - routing
          properties:
            direction:
              $ref: '#/components/schemas/Direction'
            from_anchor:
              $ref: '#/components/schemas/Anchor'
            from_id:
              type: string
            head_from:
              $ref: '#/components/schemas/Head'
            head_to:
              $ref: '#/components/schemas/Head'
            label_offset:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/Point'
            routing:
              $ref: '#/components/schemas/Routing'
            stroke:
              type: string
            stroke_dash:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/StrokeDash'
            stroke_width:
              type: integer
              format: int32
              minimum: 0
            to_anchor:
              $ref: '#/components/schemas/Anchor'
            to_id:
              type: string
            waypoints:
              type:
              - array
              - 'null'
              items:
                $ref: '#/components/schemas/Point'
        - type: object
          description: |-
            ADR-0018 D12 amend / ADR-0036 — Canvas component connector.

            Endpoint-bound wire connecting two other items. `x/y/w/h` on `common`
            is a *BBox cache* (not user input): `put_layout_handler` recomputes
            it from the two anchor points before validation. `from_id` / `to_id`
            must refer to non-connector items (refer-integrity + no chain), and
            `from_id != to_id` (self-loop reject, MVP — ADR-0036 O2).
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - connector
        description: |-
          ADR-0018 D12 amend / ADR-0036 — Canvas component connector.

          Endpoint-bound wire connecting two other items. `x/y/w/h` on `common`
          is a *BBox cache* (not user input): `put_layout_handler` recomputes
          it from the two anchor points before validation. `from_id` / `to_id`
          must refer to non-connector items (refer-integrity + no chain), and
          `from_id != to_id` (self-loop reject, MVP — ADR-0036 O2).
      - allOf:
        - $ref: '#/components/schemas/ItemCommon'
        - type: object
          properties:
            entries:
              type: array
              items:
                $ref: '#/components/schemas/SnippetEntry'
              description: |-
                0..[`SNIPPETS_ENTRIES_CAP`] entries. Order is preserved verbatim;
                FE renders badges in this order. Empty `Vec` is the *empty
                state* (FE shows just the "+ add" affordance).
        - type: object
          description: |-
            ADR-0038 — Snippet collection. A canvas-local registry of (key, body)
            pairs. Click a badge ⇒ copy `body` to clipboard (FE-side action,
            no BE involvement). All edits round-trip through the standard
            `PUT /layout` endpoint.
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - snippets
        description: |-
          ADR-0038 — Snippet collection. A canvas-local registry of (key, body)
          pairs. Click a badge ⇒ copy `body` to clipboard (FE-side action,
          no BE involvement). All edits round-trip through the standard
          `PUT /layout` endpoint.
      description: |-
        Canvas Item discriminated union (ADR-0018 D1, D4).

        On the wire each variant becomes `{ "type": "<snake>", ...common, ...payload }`
        thanks to `#[serde(tag = "type")]` + `#[serde(flatten)]` on `common`.
    ItemCommon:
      type: object
      description: |-
        Fields common to every Canvas Item — flattened into each variant of [`Item`]
        via `#[serde(flatten)]` so the on-disk JSON keeps a single flat object per
        item (no nested `common: { ... }` envelope).
      required:
      - id
      - x
      - y
      - w
      - h
      - z
      - visibility
      - locked
      properties:
        description:
          type: string
        h:
          type: number
          format: double
        id:
          type: string
        label:
          type: string
        locked:
          type: boolean
        minimized:
          type: boolean
        parent_id:
          type:
          - string
          - 'null'
        visibility:
          $ref: '#/components/schemas/Visibility'
        w:
          type: number
          format: double
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        z:
          type: integer
          format: int32
    Layout:
      type: object
      description: |-
        Body of a Session file record. Serde-derived: round-trips losslessly with
        the on-disk JSON shape defined in ADR-0018 D1.
      required:
      - schema_version
      - groups
      - items
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
          description: Group tree (unchanged across v1/v2 — ADR-0010).
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: Canvas Items (terminal Panel + non-terminal) — discriminated union by `type`.
        schema_version:
          type: integer
          format: int32
          description: Always `2` for v2 records. v1 → v2 hard cutover lives in `workspace.rs`.
          minimum: 0
        viewport:
          $ref: '#/components/schemas/Viewport'
          description: Canvas viewport state (pan + zoom).
      additionalProperties: false
    Point:
      type: object
      description: 2D point — shared payload for `free_draw` and `connector` items.
      required:
      - x
      - y
      properties:
        x:
          type: number
          format: double
        y:
          type: number
          format: double
      additionalProperties: false
    Routing:
      type: string
      description: |-
        Connector routing style (ADR-0036 D3). MVP wires `Straight` only; the
        other two variants persist for round-trip but the FE renderer falls
        back to straight until P1.
      enum:
      - straight
      - orthogonal
      - bezier
    SnippetEntry:
      type: object
      description: |-
        ADR-0038 D2 — 1 snippet = 1 (key, body) pair. Multiple entries live in
        a `Snippets` item's `entries` Vec.
      required:
      - id
      - key
      - body
      properties:
        body:
          type: string
          description: |-
            Body payload — copied to clipboard verbatim on badge click. Allowed
            to be empty. Length cap: [`SNIPPET_BODY_MAX_BYTES`].
        id:
          type: string
          description: |-
            UUID v4 lowercase 36-char. Stable across edits — FE uses this for
            list reconciliation and reorder.
        key:
          type: string
          description: |-
            Badge display label. Must be non-empty after `trim`. Length cap:
            [`SNIPPET_KEY_MAX_BYTES`]. Duplicate keys within the same item are
            allowed (FE shows a soft hint — ADR-0038 D7 / O9).
      additionalProperties: false
    StrokeDash:
      type: string
      description: Connector stroke dash pattern (ADR-0036 D1 — optional, `null` for solid).
      enum:
      - dash
      - dot
    TextAlign:
      type: string
      description: |-
        Horizontal alignment for text Canvas Items. Defaults to center so newly
        created empty text boxes edit from their visual center.
      enum:
      - left
      - center
      - right
    TextVerticalAlign:
      type: string
      description: Vertical alignment for text Canvas Items.
      enum:
      - top
      - middle
      - bottom
    Viewport:
      type: object
      description: Canvas viewport state.
      required:
      - x
      - y
      - zoom
      properties:
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        zoom:
          type: number
          format: double
      additionalProperties: false
    Visibility:
      type: string
      description: |-
        Visibility tri-state. The JSON wire form is `"visible" | "hidden"`. We keep
        it as a typed enum here instead of `bool` because ADR-0010 explicitly leaves
        room for an `inherit` variant in the layer-tree work, and so that round-trip
        against legacy v1 payloads (which used `true`/`false`) is detected as an
        error rather than silently coerced.
      enum:
      - visible
      - hidden
