<!doctype html>
<html lang="en">
<head><script>(function(){
  function makeStore(){
    var data = {};
    var api = {
      getItem: function(k){ return Object.prototype.hasOwnProperty.call(data, k) ? data[k] : null; },
      setItem: function(k, v){ data[k] = String(v); },
      removeItem: function(k){ delete data[k]; },
      clear: function(){ data = {}; },
      key: function(i){ return Object.keys(data)[i] || null; }
    };
    Object.defineProperty(api, 'length', { get: function(){ return Object.keys(data).length; } });
    return api;
  }
  function tryShim(name){
    var works = false;
    try { works = !!window[name] && typeof window[name].getItem === 'function'; void window[name].length; }
    catch (_) { works = false; }
    if (works) return;
    try { Object.defineProperty(window, name, { configurable: true, value: makeStore() }); }
    catch (_) { try { window[name] = makeStore(); } catch (__) {} }
  }
  tryShim('localStorage');
  tryShim('sessionStorage');
})();</script>
<meta charset="utf-8" />
<title>Sign in — gtmux</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #fafafa;
    --fg: #000000;
    --muted: #6b6b6b;
    --subtle: #9a9a9a;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.22);
    --field-bg: #ffffff;
    --field-bg-focus: #ffffff;
    --accent: #0d99ff;
    --danger: #f24822;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.06);
    --shadow-lg: 0 24px 60px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(0,0,0,0.06);
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --pill: 50px;
    --font-sans: 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', Menlo, 'JetBrains Mono', ui-monospace, monospace;
  }
  :root.dark {
    --bg: #1e1e1e;
    --surface: #2c2c2c;
    --surface-2: #262626;
    --fg: #f5f5f5;
    --muted: #9a9a9a;
    --subtle: #6b6b6b;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.28);
    --field-bg: #1a1a1a;
    --field-bg-focus: #181818;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.06);
    --shadow-lg: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    font-feature-settings: "kern" 1;
    color: var(--fg);
    background: var(--bg);
    letter-spacing: -0.14px;
    -webkit-font-smoothing: antialiased;
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
  }

  /* page chrome */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 540;
    font-size: 15px;
    letter-spacing: -0.2px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: conic-gradient(from 220deg, #0acf83, #a259ff, #f24e1e, #ff7262, #1abcfe, #0acf83);
    box-shadow: var(--shadow-sm);
  }
  .topbar-actions { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.12s;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.06); }
  :root.dark .icon-btn:hover { background: rgba(255,255,255,0.08); }
  .icon-btn:focus-visible { outline: 2px dashed var(--fg); outline-offset: 2px; }

  /* main layout */
  main {
    display: grid;
    place-items: center;
    padding: 88px 24px 48px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 40px 36px 32px;
  }
  .heading {
    font-size: 28px;
    font-weight: 540;
    letter-spacing: -0.6px;
    line-height: 1.15;
    margin: 0 0 6px;
  }
  .deck {
    font-size: 14px;
    font-weight: 330;
    color: var(--muted);
    letter-spacing: -0.1px;
    margin: 0 0 28px;
    line-height: 1.45;
  }

  /* tab segmented control */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    background: var(--surface-2);
    border-radius: var(--pill);
    margin-bottom: 24px;
  }
  .tab {
    height: 32px;
    border-radius: var(--pill);
    border: none;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 13px;
    font-weight: 480;
    letter-spacing: -0.1px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .tab[aria-selected="true"] {
    background: var(--surface);
    color: var(--fg);
    box-shadow: var(--shadow-sm);
  }
  :root.dark .tab[aria-selected="true"] { background: #383838; }
  .tab:focus-visible { outline: 2px dashed var(--fg); outline-offset: 2px; }

  /* form */
  .field { margin-bottom: 16px; }
  .label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
    font-weight: 480;
    letter-spacing: -0.05px;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .label .hint {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 400;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--subtle);
  }
  .input-wrap {
    position: relative;
  }
  .input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    background: var(--field-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    font: inherit;
    font-size: 14px;
    letter-spacing: -0.1px;
    color: var(--fg);
    transition: border-color 0.12s, background 0.12s;
  }
  .input.mono { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0; }
  .input:focus {
    outline: none;
    border-color: var(--border-strong);
    background: var(--field-bg-focus);
    box-shadow: 0 0 0 3px rgba(13,153,255,0.15);
  }
  .input::placeholder { color: var(--subtle); }
  .input.has-toggle { padding-right: 44px; }
  .toggle-eye {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: grid; place-items: center;
  }
  .toggle-eye:hover { background: rgba(0,0,0,0.06); color: var(--fg); }
  :root.dark .toggle-eye:hover { background: rgba(255,255,255,0.08); }

  .row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 4px 0 24px;
  }
  .check {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .check input {
    appearance: none;
    width: 16px; height: 16px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--field-bg);
    cursor: pointer;
    display: grid; place-items: center;
    margin: 0;
  }
  .check input:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check input:checked::after {
    content: "";
    width: 9px; height: 5px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .link {
    font-size: 13px;
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 1px;
  }
  .link:hover { border-bottom-color: var(--fg); }

  .submit {
    width: 100%;
    height: 44px;
    border-radius: var(--pill);
    border: none;
    background: var(--fg);
    color: var(--bg);
    font: inherit;
    font-size: 14px;
    font-weight: 480;
    letter-spacing: -0.1px;
    cursor: pointer;
    transition: opacity 0.12s, transform 0.04s;
  }
  .submit:hover { opacity: 0.92; }
  .submit:active { transform: scale(0.99); }
  .submit:focus-visible { outline: 2px dashed var(--fg); outline-offset: 3px; }

  .error {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    background: rgba(242,72,34,0.08);
    color: var(--danger);
    font-size: 12.5px;
    line-height: 1.4;
    display: none;
  }
  .error.visible { display: block; }

  .divider {
    margin: 24px 0 20px;
    height: 1px;
    background: var(--border);
  }
  .footer-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.55;
  }
  .footer-note a { color: var(--fg); border-bottom: 1px solid var(--border-strong); text-decoration: none; }

  .panel { display: none; }
  .panel.active { display: block; }

  .token-help {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin: -4px 0 16px;
  }
  .token-help code {
    font-family: var(--font-mono);
    font-size: 11.5px;
    background: var(--surface-2);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0;
  }

  /* page foot */
  .page-foot {
    position: fixed;
    bottom: 20px; left: 0; right: 0;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--subtle);
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <span>gtmux</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 9.5A5.5 5.5 0 016.5 2.5a5.5 5.5 0 107 7z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section class="card" role="dialog" aria-labelledby="title">
      <h1 class="heading" id="title">Enter gtmux</h1>
      <p class="deck">Authenticate with a token or password. Your session persists on this device.</p>

      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true" data-tab="token" id="tab-token">Token</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="password" id="tab-password">Password</button>
      </div>

      <div class="panel active" id="panel-token" role="tabpanel" aria-labelledby="tab-token">
        <form id="form-token" autocomplete="off">
          <div class="field">
            <div class="label">
              <span>Access token</span>
              <span class="hint">Secret</span>
            </div>
            <div class="input-wrap">
              <input class="input mono has-toggle" type="password" id="token" name="token" placeholder="Paste your token" required minlength="8" autofocus />
              <button type="button" class="toggle-eye" aria-label="Show token" data-toggle="token">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="submit">Continue</button>
          <div class="error" id="err-token">Token looks too short. Check and paste again.</div>
        </form>
      </div>

      <div class="panel" id="panel-password" role="tabpanel" aria-labelledby="tab-password">
        <form id="form-password" autocomplete="off">
          <div class="field">
            <div class="label">
              <span>Password</span>
            </div>
            <div class="input-wrap">
              <input class="input has-toggle" type="password" id="password" name="password" placeholder="Enter password" required minlength="6" autocomplete="current-password" />
              <button type="button" class="toggle-eye" aria-label="Show password" data-toggle="password">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="submit">Continue</button>
          <div class="error" id="err-password">Password must be at least 6 characters.</div>
        </form>
      </div>
    </section>
  </main>

  <div class="page-foot">gtmux · v0.4 · build 2026.05</div>

<script>
  // theme
  const root = document.documentElement;
  const saved = localStorage.getItem('gtmux-theme');
  if (saved === 'dark') root.classList.add('dark');
  document.getElementById('theme-toggle').addEventListener('click', () => {
    root.classList.toggle('dark');
    localStorage.setItem('gtmux-theme', root.classList.contains('dark') ? 'dark' : 'light');
  });

  // password reveal
  document.querySelectorAll('.toggle-eye').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.toggle);
      const isPwd = input.type === 'password';
      input.type = isPwd ? 'text' : 'password';
      btn.setAttribute('aria-label', isPwd ? 'Hide' : 'Show');
    });
  });

  // tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.setAttribute('aria-selected', 'false'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.setAttribute('aria-selected', 'true');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      const input = document.querySelector('#panel-' + tab.dataset.tab + ' .input');
      if (input) input.focus();
    });
  });

  // submit → redirect to editor (stub validation)
  document.getElementById('form-token').addEventListener('submit', (e) => {
    e.preventDefault();
    const tok = document.getElementById('token').value.trim();
    if (tok.length < 8) return document.getElementById('err-token').classList.add('visible');
    sessionStorage.setItem('gtmux-auth', '1');
    window.location.href = 'index.html';
  });
  document.getElementById('form-password').addEventListener('submit', (e) => {
    e.preventDefault();
    const pwd = document.getElementById('password').value;
    if (pwd.length < 6) return document.getElementById('err-password').classList.add('visible');
    sessionStorage.setItem('gtmux-auth', '1');
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
