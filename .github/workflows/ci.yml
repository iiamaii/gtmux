# gtmux CI placeholder (Task C3).
#
# Three jobs:
#   - check          fast feedback (cargo check + svelte-check)
#   - build          full build (cargo build + vite build)
#   - codegen-verify regenerate openapi.yaml + api.d.ts, fail on diff
#
# Cache is intentionally absent here -- this is a placeholder. Tune
# (sccache, cargo-cache, node_modules cache) once C4 smoke is green.
#
# Layout decision references: ADR-0011 (rust-toolchain.toml is the pin),
# ADR-0012 D7 (utoipa -> openapi-typescript single path).

name: ci

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: codebase

jobs:
  check:
    name: check (rust + node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pin from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: cargo check --workspace
        working-directory: codebase/backend
        run: cargo check --workspace --all-targets

      - name: cargo fmt --check
        working-directory: codebase/backend
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: codebase/backend
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: npm ci
        working-directory: codebase/frontend
        run: npm ci

      - name: npm run check
        working-directory: codebase/frontend
        run: npm run check

  build:
    name: build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm ci (frontend)
        working-directory: codebase/frontend
        run: npm ci
      - name: make build
        run: make build

  codegen-verify:
    name: codegen-verify (no drift)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: codebase/frontend
        run: npm ci

      - name: make codegen
        run: make codegen

      - name: Fail on uncommitted codegen drift
        run: |
          if ! git diff --exit-code -- shared/openapi.yaml frontend/src/lib/types/api.d.ts; then
            echo "::error::Generated files differ from committed copies. Run 'make codegen' and commit the result."
            exit 1
          fi
