<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>gtmux</title>
    <script>
      // FOUC guard — apply theme before Svelte hydrates so the first paint
      // never flashes the wrong theme. Mirrors `$lib/stores/theme.svelte.ts`
      // resolveInitial() priority chain: localStorage('gtmux-theme') is
      // one of 'system' | 'light' | 'dark'; 'system' (or missing) falls
      // through to prefers-color-scheme. Runs synchronously at <head>
      // parse time.
      (function () {
        try {
          var mode = localStorage.getItem('gtmux-theme');
          if (mode !== 'light' && mode !== 'dark' && mode !== 'system') {
            mode = 'system';
          }
          var resolved = mode;
          if (mode === 'system') {
            resolved =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          if (resolved === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage / matchMedia inaccessible — default to dark by
          // adding the class so the canvas-friendly palette wins.
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
